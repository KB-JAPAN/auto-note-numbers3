      - name: Debug secrets
        run: |
          echo "NOTE_ACCESS_TOKEN=$NOTE_ACCESS_TOKEN"
          echo "MANUS_API_KEY=$MANUS_API_KEY"
        env:
          NOTE_ACCESS_TOKEN: ${{ secrets.NOTE_ACCESS_TOKEN }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}

      - name: Run script
        run: python auto_pipeline.py
        env:
          NOTE_ACCESS_TOKEN: ${{ secrets.NOTE_ACCESS_TOKEN }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
