name: auto note post

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Debug secrets
        run: |
          echo "NOTE_ACCESS_TOKEN=$NOTE_ACCESS_TOKEN"
          echo "MANUS_API_KEY=$MANUS_API_KEY"
        env:
          NOTE_ACCESS_TOKEN: ${{ secrets.NOTE_ACCESS_TOKEN }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}

      - name: Run script
        run: python auto_pipeline.py
        env:
          NOTE_ACCESS_TOKEN: ${{ secrets.NOTE_ACCESS_TOKEN }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
